app = 'agentbnb'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 7701
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = '10s'
  timeout = '2s'
  grace_period = '10s'
  method = 'get'
  path = '/health'

[mounts]
  source = 'agentbnb_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
