name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Hub dependencies
        # --ignore-workspace required: pnpm v10+ treats hub as part of the root
        # workspace (because of pnpm-workspace.yaml at repo root) and silently
        # skips installing hub's own deps unless this flag is passed.
        run: cd hub && pnpm install --ignore-workspace

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Lint
        run: pnpm run lint

      - name: Build skill-inspector package
        # Backend integration tests spawn the CLI which imports
        # @agentbnb/skill-inspector — its dist/ must exist before tests run.
        run: pnpm -F @agentbnb/skill-inspector build

      - name: Test (backend)
        run: pnpm run test:run

      - name: Test (hub)
        run: cd hub && pnpm run test
        continue-on-error: true
